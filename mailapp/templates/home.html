<!DOCTYPE html>
<html>
<head>
    <title>Email Sender</title>
</head>
<body>

    <h1>Send Email</h1>

    <form action="/send-email/" method="post">
        {% csrf_token %}

        <input
            type="email"
            name="email"
            placeholder="Enter recipient email"
            required
        >

        <button type="submit">
            Send Email
        </button>
    </form>

</body>
</html>
